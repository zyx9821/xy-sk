name = "xy-sk"
main = "worker.js"
compatibility_date = "2026-05-20"

# 定时任务：每 1 分钟执行一次链上巡检
[triggers]
crons = ["* * * * *"]

# 绑定 KV 数据库
[[kv_namespaces]]
binding = "kv"
id = "84e985df03234e77a85b5961152e77e0"

# 绑定 D1 数据库
[[d1_databases]]
binding = "db"
database_name = "db"
database_id = "5f6f653a-f4ab-4e28-89fe-4b14d3258d0f"

# ==========================================
# 【新增】配置规则：允许将 .html 当作文本模块导入
# ==========================================
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true
